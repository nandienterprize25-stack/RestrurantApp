<div class="food-mgmt-container-wrapper">

    <div class="action-bar-top-panel">
        <div>
            <h2 style="margin:0; font-size: 20px; color:#0f172a; font-weight: 700; font-family: sans-serif;">Food Item Variant Catalog</h2>
            <p style="margin:4px 0 0 0; font-size: 13px; color:#64748b; font-family: sans-serif;">Manage sizing options, accurate menu rates, diet parameters, and specific allergen descriptors.</p>
        </div>
        <button type="button" class="primary-trigger-action-btn" style="background: #1e293b;" (click)="openCreateModal()">➕ Add Variant</button>
    </div>

    <div class="grid-table-frame-wrapper" style="width: 100%; margin-top: 10px;">
        <ag-grid-angular 
            style="width: 100%; height: 500px;" 
            class="ag-theme-alpine"
            [rowData]="rowData" 
            [columnDefs]="columnDefs"
            [rowHeight]="54"
            [pagination]="true" 
            [paginationPageSize]="10" 
            (gridReady)="onGridReady($event)" 
            (cellClicked)="onCellClicked($event)">
        </ag-grid-angular>
    </div>

    <div class="category-modal-backdrop" *ngIf="isModalOpen" #backdropRef (mousedown)="$event.target === backdropRef ? closeModal() : null">
        
        <form class="modal-content-container-card" style="width: 540px; background: white; padding: 26px; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.15);" [formGroup]="variantForm" (ngSubmit)="saveVariantData()">
            
            <h3 style="margin: 0 0 20px 0; font-size: 18px; font-weight: 700; color:#0f172a; border-bottom: 1px solid #e2e8f0; padding-bottom: 12px; font-family: sans-serif;">
                {{ isEditMode ? '📝 Update Variant Parameters' : '✨ Add New Menu Variant Matrix' }}
            </h3>

            <div class="form-input-field-group" style="margin-bottom: 14px; display: flex; flex-direction: column; gap: 6px;">
                <label style="font-size: 13px; font-weight: 600; color: #334155;">Base Food Item Name <span style="color:#ef4444;">*</span></label>
                <select formControlName="menuItemId" style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; background: white; cursor: pointer;">
                    <option [ngValue]="null">-- Select Associated Main Dish --</option>
                    <option *ngFor="let food of menuItemsList" [ngValue]="food.id">
                        {{ food.name }}
                    </option>
                </select>
            </div>

            <div style="display: flex; gap: 16px; margin-bottom: 14px;">
                <div class="form-input-field-group" style="flex: 1; display: flex; flex-direction: column; gap: 6px;">
                    <label style="font-size: 13px; font-weight: 600; color: #334155;">Variant Name / Size <span style="color:#ef4444;">*</span></label>
                    <input type="text" formControlName="name" placeholder="e.g. Full, Half, Regular..." style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px;" />
                </div>

                <div class="form-input-field-group" style="width: 150px; display: flex; flex-direction: column; gap: 6px;">
                    <label style="font-size: 13px; font-weight: 600; color: #334155;">Variant Price (₹) <span style="color:#ef4444;">*</span></label>
                    <input type="number" formControlName="price" min="0" style="padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px;" />
                </div>
            </div>

            <div style="display: flex; gap: 24px; margin-bottom: 16px; background: #f8fafc; padding: 14px; border-radius: 8px; border: 1px solid #e2e8f0;">
                
                <div style="flex: 1;">
                    <label style="display: block; font-size: 13px; font-weight: 600; color: #334155; margin-bottom: 8px;">Dietary Classification</label>
                    <div style="display: flex; gap: 16px; align-items: center; height: 38px;">
                        <label style="display: flex; align-items: center; gap: 6px; font-size: 14px; color: #1e293b; cursor: pointer; font-weight: 500;">
                            <input type="radio" value="Veg" formControlName="dietaryType" style="width:16px; height:16px; accent-color:#166534;" /> Veg
                        </label>
                        <label style="display: flex; align-items: center; gap: 6px; font-size: 14px; color: #1e293b; cursor: pointer; font-weight: 500;">
                            <input type="radio" value="Non-Veg" formControlName="dietaryType" style="width:16px; height:16px; accent-color:#991b1b;" /> Non-Veg
                        </label>
                    </div>
                </div>

                <div style="width: 180px; display: flex; flex-direction: column; gap: 6px;">
                    <label style="font-size: 13px; font-weight: 600; color: #334155;">Level of Spices</label>
                    <select formControlName="spiceLevel" style="padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; background: white; cursor: pointer;">
                        <option value="None">None (Mild)</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High (Spicy)</option>
                        <option value="Extra Hot">Extra Hot 🔥</option>
                    </select>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 13px; font-weight: 600; color: #334155; margin-bottom: 8px;">Allergen Warning Disclaimers</label>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; background: #ffffff; border: 1px solid #cbd5e1; padding: 12px; border-radius: 6px;" formArrayName="allergens">
                    <div *ngFor="let allergen of allergensConfig; let idx = index" style="display: flex; align-items: center;">
                        <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; color: #475569; cursor: pointer; user-select: none;">
                            <input type="checkbox" [formControlName]="idx" style="width: 16px; height: 16px; cursor: pointer; accent-color: #1e293b;" />
                            {{ allergen.label }}
                        </label>
                    </div>
                </div>
            </div>

            <div style="display: flex; margin-bottom: 22px;">
                <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: #334155; cursor: pointer;">
                    <input type="checkbox" formControlName="isActive" style="width: 16px; height: 16px; cursor: pointer;" /> Variant Active and Available
                </label>
            </div>

            <div style="display:flex; justify-content:flex-end; gap:12px; border-top:1px solid #e2e8f0; padding-top:16px;">
                <button type="button" style="cursor:pointer; background:#f1f5f9; color: #475569; border: 1px solid #cbd5e1; padding: 9px 18px; border-radius: 6px; font-size: 13px; font-weight: 600;" (click)="closeModal()">Cancel</button>
                <button type="submit" style="cursor:pointer; background:#1e293b; color:white; border:none; padding: 9px 22px; border-radius: 6px; font-size: 13px; font-weight: 600;">💾 Save Variant</button>
            </div>
        </form>
    </div>
</div>
