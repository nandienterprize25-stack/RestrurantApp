<div class="main-content flex-container">
  <div class="page-title-box">
    <h2>Unavailable Day Management Panel</h2>
    <p class="subtitle">Set up operations locking windows and blackout schedules</p>
  </div>

  <div class="grid-two-col">
    <div class="card-form shadow-frame">
      <div class="card-form-header"><h3>Add New Out-Of-Service Window</h3></div>
      <div class="vertical-stack margin-top-sm">
        <div class="form-group"><label>Unavailability Date *</label><input type="date" [(ngModel)]="newLock.date" class="form-control"></div>
        <div class="form-group"><label>Start Time Lock *</label><input type="time" [(ngModel)]="newLock.start" class="form-control"></div>
        <div class="form-group"><label>End Time Release *</label><input type="time" [(ngModel)]="newLock.end" class="form-control"></div>
        <button class="btn btn-search margin-top-sm" (click)="saveUnavailability()">Add Locking Window</button>
      </div>
    </div>

    <div class="table-card">
      <table class="custom-table">
        <thead>
          <tr><th>SL</th><th>Unavailable Date</th><th>Available Time Window Mapping</th></tr>
        </thead>
        <tbody>
          <tr *ngFor="let un of unavailabilities">
            <td>{{ un.sl }}</td><td>{{ un.unavailableDate }}</td><td class="text-danger">⚠️ {{ un.availableTime }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
